<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio Grupo 2Z</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="parallax">
        <h1 style="font-size: 100px;">Frieren Team</h1>
    </section>

    <div class="cards">
        <div class="card">
            <img src="Frieren.png" alt="Avatar">
            <div class="container">
                <h4><b>Frieren</b></h4>
                <p>The Slayer and The Gatest Mage</p>
            </div>
        </div>

        <div class="card">
            <img src="Fern.png" alt="Avatar">
            <div class="container">
                <h4><b>Fern</b></h4>
                <p>The 1° Classe Mage</p>
            </div>
        </div>

        <div class="card">
            <img src="Stark.png" alt="Avatar">
            <div class="container">
                <h4><b>Stark</b></h4>
                <p>The Warrior</p>
            </div>
        </div>

        <div class="card">
            <img src="Sein.png" alt="Avatar">
            <div class="container">
                <h4><b>Sein</b></h4>
                <p>The Priest</p>
            </div>
        </div>
    </div>
</body>
</html>
